<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks - Rukphong Pullaoy</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600&family=Roboto+Slab:wght@400;700&display=swap');
        * { box-sizing: border-box; }
        body { font-family: 'Open Sans', sans-serif; margin: 0; padding: 0; background: #eaeaea; color: #333; }

        .site-nav { background: #0B1426; display: flex; flex-wrap: wrap; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.4); border-bottom: 1px solid rgba(184,150,62,0.25); }
        .site-nav a { color: #6B7FA3; text-decoration: none; padding: 13px 18px; font-size: 0.87em; font-weight: 600; font-family: 'Inter', 'Open Sans', sans-serif; transition: color .18s, background .18s; border-bottom: 2px solid transparent; }
        .site-nav a:hover { color: #D4AF5A; background: rgba(184,150,62,0.06); }
        .site-nav a.active { color: #D4AF5A; border-bottom-color: #B8963E; background: rgba(184,150,62,0.08); }

        .container { width: 90%; max-width: 1100px; margin: 30px auto; padding: 20px; background: #fff; box-shadow: 0 0 20px rgba(0,0,0,0.1); border-radius: 10px; }
        h1 { font-family: 'Roboto Slab', serif; color: #2c3e50; text-align: center; font-size: 2.2em; margin-bottom: 20px; }

        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 24px; }
        .card { background: #f8f9fa; border-radius: 8px; padding: 14px; text-align: center; border-left: 4px solid #2980b9; }
        .card.todo   { border-left-color: #95a5a6; }
        .card.inprog { border-left-color: #f39c12; }
        .card.done   { border-left-color: #27ae60; }
        .card .label { font-size: 0.78em; color: #7f8c8d; text-transform: uppercase; letter-spacing: 0.5px; }
        .card .value { font-size: 1.6em; font-weight: 600; color: #2c3e50; margin-top: 4px; }

        .section-header { font-family: 'Roboto Slab', serif; color: #2c3e50; font-size: 1.35em; margin: 28px 0 14px 0; border-bottom: 2px solid #ddd; padding-bottom: 8px; }

        .form-section { background: #f8f9fa; border-radius: 8px; padding: 18px; margin-bottom: 20px; }
        .form-section h2 { font-family: 'Roboto Slab', serif; color: #2980b9; font-size: 1.25em; margin: 0 0 14px 0; border-bottom: 2px solid #ddd; padding-bottom: 7px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 11px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-size: 0.84em; font-weight: 600; color: #555; margin-bottom: 4px; }
        .form-group input, .form-group select, .form-group textarea { padding: 7px 10px; border: 1px solid #ccc; border-radius: 5px; font-family: 'Open Sans', sans-serif; font-size: 0.92em; color: #333; }
        .form-group textarea { resize: vertical; min-height: 52px; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: #2980b9; }
        .form-actions { margin-top: 13px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

        .btn { padding: 8px 17px; border: none; border-radius: 5px; cursor: pointer; font-family: 'Open Sans', sans-serif; font-size: 0.92em; font-weight: 600; transition: opacity 0.15s; }
        .btn:hover { opacity: 0.83; }
        .btn-primary { background: #2980b9; color: #fff; }
        .btn-danger  { background: #e74c3c; color: #fff; padding: 4px 10px; font-size: 0.82em; }
        .btn-edit    { background: #f39c12; color: #fff; padding: 4px 10px; font-size: 0.82em; }
        .btn-cancel  { background: #95a5a6; color: #fff; }

        .filter-bar { display: flex; gap: 12px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
        .filter-bar label { font-size: 0.9em; font-weight: 600; color: #555; }
        .filter-bar select, .filter-bar input { padding: 6px 10px; border: 1px solid #ccc; border-radius: 5px; font-family: 'Open Sans', sans-serif; font-size: 0.9em; }

        /* Kanban columns */
        .kanban { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
        .kanban-col { background: #f8f9fa; border-radius: 8px; padding: 14px; min-height: 200px; }
        .kanban-col-header { font-family: 'Roboto Slab', serif; font-size: 1em; font-weight: 700; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 3px solid; display: flex; align-items: center; justify-content: space-between; }
        .col-todo   .kanban-col-header { color: #636e72; border-color: #95a5a6; }
        .col-inprog .kanban-col-header { color: #b7810a; border-color: #f39c12; }
        .col-done   .kanban-col-header { color: #1d6a3a; border-color: #27ae60; }

        .task-card { background: #fff; border-radius: 6px; padding: 12px; margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); border-left: 4px solid #ddd; transition: box-shadow 0.2s; }
        .task-card:hover { box-shadow: 0 3px 10px rgba(0,0,0,0.12); }
        .task-card.prio-high   { border-left-color: #e74c3c; }
        .task-card.prio-medium { border-left-color: #f39c12; }
        .task-card.prio-low    { border-left-color: #27ae60; }
        .task-card.is-done     { opacity: 0.6; }

        .task-title { font-weight: 600; font-size: 0.95em; color: #2c3e50; margin-bottom: 6px; display: flex; align-items: flex-start; gap: 8px; }
        .task-title input[type=checkbox] { margin-top: 2px; cursor: pointer; width: 16px; height: 16px; flex-shrink: 0; }
        .task-title span.done-text { text-decoration: line-through; color: #95a5a6; }

        .task-meta { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 6px; }
        .task-notes { font-size: 0.82em; color: #7f8c8d; margin-bottom: 6px; }
        .task-actions { display: flex; gap: 6px; justify-content: flex-end; }

        .prio-badge { display: inline-block; padding: 1px 7px; border-radius: 8px; font-size: 0.73em; font-weight: 600; text-transform: uppercase; }
        .prio-high   { background: #f9ebea; color: #7b241c; }
        .prio-medium { background: #fdebd0; color: #784212; }
        .prio-low    { background: #d5f5e3; color: #1d6a3a; }

        .due-date { font-size: 0.78em; color: #7f8c8d; }
        .due-overdue { color: #e74c3c; font-weight: 600; }

        .badge-count { background: #2980b9; color: #fff; border-radius: 10px; padding: 1px 7px; font-size: 0.78em; font-family: 'Open Sans', sans-serif; }
        .col-todo   .badge-count { background: #95a5a6; }
        .col-inprog .badge-count { background: #f39c12; }
        .col-done   .badge-count { background: #27ae60; }

        .empty-col { text-align: center; color: #bdc3c7; font-size: 0.88em; padding: 20px 0; }

        @media (max-width: 700px) { .kanban { grid-template-columns: 1fr; } .summary-grid { grid-template-columns: repeat(2, 1fr); } .form-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<nav class="site-nav">
    <a href="/main">&#128100; Profile</a>
    <a href="/investment">&#128200; Investment</a>
    <a href="/expense">&#128176; Expense</a>
    <a href="/notes">&#128221; Notes</a>
    <a href="/tasks" class="active">&#9989; Tasks</a>
</nav>

<div class="container">
    <h1>Task Manager</h1>

    <div class="summary-grid">
        <div class="card todo"><div class="label">To Do</div><div class="value" id="cntTodo">0</div></div>
        <div class="card inprog"><div class="label">In Progress</div><div class="value" id="cntInprog">0</div></div>
        <div class="card done"><div class="label">Done</div><div class="value" id="cntDone">0</div></div>
        <div class="card"><div class="label">Total</div><div class="value" id="cntTotal">0</div></div>
    </div>

    <div class="section-header">Add Task</div>
    <div class="form-section">
        <h2 id="formTitle">New Task</h2>
        <input type="hidden" id="editId">
        <div class="form-grid">
            <div class="form-group" style="grid-column: span 2;">
                <label>Title *</label>
                <input type="text" id="taskTitle" placeholder="What needs to be done?">
            </div>
            <div class="form-group">
                <label>Priority</label>
                <select id="taskPriority">
                    <option value="high">High</option>
                    <option value="medium" selected>Medium</option>
                    <option value="low">Low</option>
                </select>
            </div>
            <div class="form-group">
                <label>Status</label>
                <select id="taskStatus">
                    <option value="todo" selected>To Do</option>
                    <option value="inprogress">In Progress</option>
                    <option value="done">Done</option>
                </select>
            </div>
            <div class="form-group">
                <label>Due Date</label>
                <input type="date" id="taskDue">
            </div>
            <div class="form-group" style="grid-column: span 2;">
                <label>Notes</label>
                <textarea id="taskNotes" placeholder="Optional notes..."></textarea>
            </div>
        </div>
        <div class="form-actions">
            <button class="btn btn-primary" onclick="saveTask()">Save</button>
            <button class="btn btn-cancel" id="cancelBtn" onclick="cancelEdit()" style="display:none;">Cancel</button>
            <span id="formError" style="color:#e74c3c; font-size:0.88em;"></span>
        </div>
    </div>

    <div class="section-header" style="display:flex; align-items:center; justify-content:space-between;">
        Board
        <div class="filter-bar" style="margin:0;">
            <label>Priority:</label>
            <select id="filterPriority" onchange="render()">
                <option value="">All</option>
                <option value="high">High</option>
                <option value="medium">Medium</option>
                <option value="low">Low</option>
            </select>
            <input type="text" id="filterSearch" placeholder="Search tasks..." oninput="render()">
        </div>
    </div>

    <div class="kanban">
        <div class="kanban-col col-todo">
            <div class="kanban-col-header">To Do <span class="badge-count" id="badge-todo">0</span></div>
            <div id="col-todo"></div>
        </div>
        <div class="kanban-col col-inprog">
            <div class="kanban-col-header">In Progress <span class="badge-count" id="badge-inprog">0</span></div>
            <div id="col-inprog"></div>
        </div>
        <div class="kanban-col col-done">
            <div class="kanban-col-header">Done <span class="badge-count" id="badge-done">0</span></div>
            <div id="col-done"></div>
        </div>
    </div>
</div>

<script>
const KEY = 'rukphong_tasks';
const PRIO_LABELS = {high:'High', medium:'Medium', low:'Low'};
const STATUS_MAP  = {todo:'todo', inprogress:'inprog', done:'done'};

function load() { return JSON.parse(localStorage.getItem(KEY) || '[]'); }
function save(d) { localStorage.setItem(KEY, JSON.stringify(d)); }
function esc(s)  { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function isOverdue(due) {
    if (!due) return false;
    return due < new Date().toISOString().slice(0,10);
}

function updateSummary(data) {
    const todo = data.filter(t=>t.status==='todo').length;
    const inprog = data.filter(t=>t.status==='inprogress').length;
    const done  = data.filter(t=>t.status==='done').length;
    document.getElementById('cntTodo').textContent   = todo;
    document.getElementById('cntInprog').textContent = inprog;
    document.getElementById('cntDone').textContent   = done;
    document.getElementById('cntTotal').textContent  = data.length;
    document.getElementById('badge-todo').textContent   = todo;
    document.getElementById('badge-inprog').textContent = inprog;
    document.getElementById('badge-done').textContent   = done;
}

function render() {
    const data = load();
    const fp = document.getElementById('filterPriority').value;
    const fs = document.getElementById('filterSearch').value.toLowerCase();
    const rows = data.filter(t =>
        (!fp || t.priority===fp) &&
        (!fs || t.title.toLowerCase().includes(fs) || (t.notes||'').toLowerCase().includes(fs))
    );

    updateSummary(data);

    ['todo','inprogress','done'].forEach((status, i) => {
        const colId = ['col-todo','col-inprog','col-done'][i];
        const col = document.getElementById(colId);
        const tasks = rows.filter(t => t.status === status)
            .sort((a,b) => {
                const po = {high:0,medium:1,low:2};
                return (po[a.priority]||1) - (po[b.priority]||1);
            });
        col.innerHTML = '';
        if (!tasks.length) { col.innerHTML = '<div class="empty-col">No tasks here</div>'; return; }
        tasks.forEach(t => {
            const isDone = t.status === 'done';
            const overdue = !isDone && isOverdue(t.due);
            const div = document.createElement('div');
            div.className = `task-card prio-${t.priority}${isDone?' is-done':''}`;
            div.innerHTML = `
                <div class="task-title">
                    <input type="checkbox" ${isDone?'checked':''} onchange="toggleDone('${t.id}', this.checked)" title="Mark done">
                    <span class="${isDone?'done-text':''}">${esc(t.title)}</span>
                </div>
                <div class="task-meta">
                    <span class="prio-badge prio-${t.priority}">${PRIO_LABELS[t.priority]}</span>
                    ${t.due ? `<span class="due-date ${overdue?'due-overdue':''}">&#128197; ${t.due}${overdue?' (overdue)':''}</span>` : ''}
                </div>
                ${t.notes ? `<div class="task-notes">${esc(t.notes)}</div>` : ''}
                <div class="task-actions">
                    <select class="status-select" onchange="changeStatus('${t.id}', this.value)" style="padding:3px 6px; border:1px solid #ccc; border-radius:4px; font-size:0.8em; cursor:pointer;">
                        <option value="todo" ${t.status==='todo'?'selected':''}>To Do</option>
                        <option value="inprogress" ${t.status==='inprogress'?'selected':''}>In Progress</option>
                        <option value="done" ${t.status==='done'?'selected':''}>Done</option>
                    </select>
                    <button class="btn btn-edit" onclick="editTask('${t.id}')">Edit</button>
                    <button class="btn btn-danger" onclick="deleteTask('${t.id}')">Del</button>
                </div>`;
            col.appendChild(div);
        });
    });
}

function toggleDone(id, checked) {
    const data = load();
    const idx = data.findIndex(t => t.id === id);
    if (idx !== -1) data[idx].status = checked ? 'done' : 'todo';
    save(data); render();
}

function changeStatus(id, status) {
    const data = load();
    const idx = data.findIndex(t => t.id === id);
    if (idx !== -1) data[idx].status = status;
    save(data); render();
}

function saveTask() {
    const id       = document.getElementById('editId').value;
    const title    = document.getElementById('taskTitle').value.trim();
    const priority = document.getElementById('taskPriority').value;
    const status   = document.getElementById('taskStatus').value;
    const due      = document.getElementById('taskDue').value;
    const notes    = document.getElementById('taskNotes').value.trim();
    const errEl    = document.getElementById('formError');
    if (!title) { errEl.textContent = 'Title is required.'; return; }
    errEl.textContent = '';
    const data = load();
    if (id) { const idx=data.findIndex(t=>t.id===id); if(idx!==-1) data[idx]={...data[idx],title,priority,status,due,notes}; }
    else data.push({id:Date.now().toString(), title, priority, status, due, notes});
    save(data); clearForm(); render();
}

function editTask(id) {
    const t = load().find(x => x.id === id); if (!t) return;
    document.getElementById('editId').value = id;
    document.getElementById('taskTitle').value = t.title;
    document.getElementById('taskPriority').value = t.priority;
    document.getElementById('taskStatus').value = t.status;
    document.getElementById('taskDue').value = t.due || '';
    document.getElementById('taskNotes').value = t.notes || '';
    document.getElementById('formTitle').textContent = 'Edit Task';
    document.getElementById('cancelBtn').style.display = 'inline-block';
    document.querySelector('.form-section').scrollIntoView({behavior:'smooth'});
}

function deleteTask(id) {
    if (!confirm('Delete this task?')) return;
    save(load().filter(t => t.id !== id)); render();
}

function cancelEdit() { clearForm(); }
function clearForm() {
    ['editId','taskTitle','taskDue','taskNotes'].forEach(id=>{document.getElementById(id).value='';});
    document.getElementById('taskPriority').value = 'medium';
    document.getElementById('taskStatus').value   = 'todo';
    document.getElementById('formTitle').textContent = 'New Task';
    document.getElementById('cancelBtn').style.display = 'none';
    document.getElementById('formError').textContent = '';
}

render();
</script>
</body>
</html>
