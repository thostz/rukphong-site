<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rukphong Pullaoy — Executive Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; font-family: 'Inter', sans-serif; background: #F5F7FA; }

  /* ── HEADER ── */
  header {
    height: 58px;
    background: #FFFFFF;
    border-bottom: 1px solid rgba(0,0,0,0.08);
    box-shadow: 0 1px 6px rgba(0,0,0,0.06);
    display: flex; align-items: center;
    padding: 0 24px; gap: 20px;
    position: relative; z-index: 100;
    flex-shrink: 0;
  }

  /* gold top line */
  header::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, #B8963E, #D4AF5A, #B8963E);
  }

  .logo {
    display: flex; align-items: center; gap: 12px; flex-shrink: 0;
    border-right: 1px solid rgba(0,0,0,0.08); padding-right: 20px;
  }
  .logo-avatar {
    width: 34px; height: 34px; border-radius: 6px;
    background: linear-gradient(135deg, #B8963E, #D4AF5A);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem; font-weight: 800; color: #fff;
    flex-shrink: 0;
  }
  .logo-text { font-size: 0.88rem; font-weight: 700; color: #1A2340; letter-spacing: 0.2px; }
  .logo-sub  { font-size: 0.62rem; color: #B8963E; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }

  /* ── TABS ── */
  .tabs {
    display: flex; align-items: center; gap: 2px;
    flex: 1; overflow-x: auto; scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }

  .tab {
    display: flex; align-items: center; gap: 7px;
    padding: 7px 16px; border-radius: 6px;
    font-size: 0.8rem; font-weight: 600; color: #6B7FA3;
    cursor: pointer; white-space: nowrap;
    border: 1px solid transparent;
    transition: all .18s; background: none; text-decoration: none;
  }
  .tab:hover { color: #B8963E; background: rgba(184,150,62,0.07); }
  .tab.active {
    color: #B8963E;
    background: rgba(184,150,62,0.1);
    border-color: rgba(184,150,62,0.25);
  }

  /* ── RIGHT ── */
  .header-right {
    display: flex; align-items: center; gap: 12px;
    flex-shrink: 0; margin-left: auto;
  }
  #clock {
    font-size: 0.72rem; color: #6B7FA3;
    font-variant-numeric: tabular-nums; letter-spacing: 0.3px;
  }
  .header-badge {
    font-size: 0.62rem; font-weight: 700; padding: 3px 9px;
    border-radius: 99px; letter-spacing: 0.4px; text-transform: uppercase;
    background: rgba(184,150,62,0.1); color: #B8963E;
    border: 1px solid rgba(184,150,62,0.25);
  }

  /* ── IFRAME ── */
  .frame-wrap { height: calc(100vh - 58px); width: 100%; }
  #main-frame { width: 100%; height: 100%; border: none; display: block; background: #F5F7FA; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-avatar">RP</div>
    <div>
      <div class="logo-text">Rukphong Pullaoy</div>
      <div class="logo-sub">Senior PM &amp; Consultant · Infor APAC</div>
    </div>
  </div>

  <nav class="tabs" id="tabs">
    <a class="tab active" data-src="/dashboard"  href="#"><span>🏠</span> Dashboard</a>
    <a class="tab"        data-src="/main"        href="#"><span>👤</span> Profile</a>
    <a class="tab"        data-src="/investment"  href="#"><span>📈</span> Investment</a>
    <a class="tab"        data-src="/expense"     href="#"><span>💰</span> Expense</a>
    <a class="tab"        data-src="/notes"       href="#"><span>📝</span> Notes</a>
    <a class="tab"        data-src="/tasks"       href="#"><span>✅</span> Tasks</a>
    <a class="tab"        data-src="/help"        href="#"><span>❓</span> Help</a>
  </nav>

  <div class="header-right">
    <span class="header-badge">APAC</span>
    <span id="clock"></span>
  </div>
</header>

<div class="frame-wrap">
  <iframe id="main-frame" src="/dashboard" title="Content"></iframe>
</div>

<script>
  const frame = document.getElementById('main-frame');

  function switchTab(src) {
    const tab = document.querySelector(`.tab[data-src="${src}"]`);
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    if (tab) tab.classList.add('active');
    frame.src = src;
  }

  document.getElementById('tabs').addEventListener('click', e => {
    const tab = e.target.closest('.tab');
    if (!tab) return;
    e.preventDefault();
    switchTab(tab.dataset.src);
  });

  // Allow child iframes (dashboard) to trigger tab navigation
  window.addEventListener('message', e => {
    if (e.data && e.data.action === 'switchTab') switchTab(e.data.src);
  });

  function tick() {
    const now = new Date();
    document.getElementById('clock').textContent =
      now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }
  tick(); setInterval(tick, 1000);
</script>
</body>
</html>
