<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RP Consultant — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; font-family: 'Inter', sans-serif; background: #0a0f1e; }

  /* ── HEADER ── */
  header {
    height: 56px;
    background: rgba(10,15,30,0.97);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    display: flex; align-items: center;
    padding: 0 20px; gap: 16px;
    position: relative; z-index: 100;
    flex-shrink: 0;
  }

  .logo {
    display: flex; align-items: center; gap: 10px;
    flex-shrink: 0;
  }
  .logo-avatar {
    width: 32px; height: 32px; border-radius: 8px;
    background: linear-gradient(135deg, #3b82f6, #14b8a6);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem; font-weight: 800; color: #fff;
  }
  .logo-text { font-size: 0.9rem; font-weight: 700; color: #e2e8f0; }
  .logo-sub  { font-size: 0.65rem; color: #64748b; font-weight: 500; }

  /* ── TABS ── */
  .tabs {
    display: flex; align-items: center; gap: 2px;
    flex: 1; overflow-x: auto; scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }

  .tab {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 14px; border-radius: 8px;
    font-size: 0.8rem; font-weight: 600; color: #64748b;
    cursor: pointer; white-space: nowrap;
    border: 1px solid transparent;
    transition: all .18s; background: none;
    text-decoration: none;
  }
  .tab:hover { color: #e2e8f0; background: rgba(255,255,255,0.06); }
  .tab.active {
    color: #60a5fa;
    background: rgba(59,130,246,0.12);
    border-color: rgba(59,130,246,0.25);
  }
  .tab .tab-icon { font-size: 0.95rem; }

  /* ── HEADER RIGHT ── */
  .header-right {
    display: flex; align-items: center; gap: 10px;
    flex-shrink: 0; margin-left: auto;
  }
  #clock { font-size: 0.72rem; color: #475569; font-variant-numeric: tabular-nums; }

  /* ── IFRAME ── */
  .frame-wrap {
    height: calc(100vh - 56px);
    width: 100%;
  }
  #main-frame {
    width: 100%; height: 100%;
    border: none; display: block;
    background: #0a0f1e;
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-avatar">RP</div>
    <div>
      <div class="logo-text">RP Consultant</div>
      <div class="logo-sub">Senior PM &amp; Consultant APAC</div>
    </div>
  </div>

  <nav class="tabs" id="tabs">
    <a class="tab active" data-src="/main"       href="#"><span class="tab-icon">👤</span> Profile</a>
    <a class="tab"        data-src="/investment"  href="#"><span class="tab-icon">📈</span> Investment</a>
    <a class="tab"        data-src="/expense"     href="#"><span class="tab-icon">💰</span> Expense</a>
    <a class="tab"        data-src="/notes"       href="#"><span class="tab-icon">📝</span> Notes</a>
    <a class="tab"        data-src="/tasks"       href="#"><span class="tab-icon">✅</span> Tasks</a>
    <a class="tab"        data-src="/tracker"     href="#"><span class="tab-icon">⚙️</span> Tracker</a>
  </nav>

  <div class="header-right">
    <span id="clock"></span>
  </div>
</header>

<div class="frame-wrap">
  <iframe id="main-frame" src="/main" title="Content"></iframe>
</div>

<script>
  // Tab switching
  const frame = document.getElementById('main-frame');
  document.getElementById('tabs').addEventListener('click', e => {
    const tab = e.target.closest('.tab');
    if (!tab) return;
    e.preventDefault();
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    frame.src = tab.dataset.src;
  });

  // Clock
  function tick() {
    const now = new Date();
    document.getElementById('clock').textContent =
      now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }
  tick(); setInterval(tick, 1000);

  // Sync active tab from hash on load (optional deep link)
  const hash = location.hash.replace('#','');
  if (hash) {
    const match = document.querySelector(`.tab[data-src="/${hash}"]`);
    if (match) match.click();
  }
</script>
</body>
</html>
